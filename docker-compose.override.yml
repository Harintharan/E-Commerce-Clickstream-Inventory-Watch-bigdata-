# Docker Compose Override for Development
# This file provides development-specific overrides
# Use with: docker-compose -f docker-compose.yaml -f docker-compose.override.yml up

services:
  # Override producer for faster event generation
  python-producer:
    environment:
      BATCH_SIZE: 5              # Smaller batches for testing
      BATCH_INTERVAL_SECONDS: 2  # More frequent batches
      LOG_LEVEL: DEBUG            # More verbose logging

  # Override stream processor for faster updates
  stream-processor:
    environment:
      LOG_LEVEL: DEBUG
      # Can override windowing here if needed

  # Override PostgreSQL for easier access
  postgres-db:
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust  # Simplified auth for dev

  # Add pgAdmin for database UI (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - big_data_network
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
